kind = "web"
previewPath = "/"
title = "Интерактивна карта на социалните предприятия – Североизточен район"
version = "1.0.0"
id = "artifacts/social-map"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20952

[services.development]
run = "pnpm --filter @workspace/social-map run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/social-map", "run", "build" ]
publicDir = "artifacts/social-map/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20952"
BASE_PATH = "/"
